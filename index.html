<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wandering Bar — Promo Graphics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,500&display=swap" rel="stylesheet">
<style>
  :root{--primary:#6E5252;--secondary:#C48B5A;--accent:#F5E6DC;--bg:#FDF7F3;--muted:#8C7272;--dark:#4E3838;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--dark);font-family:'DM Sans',system-ui,sans-serif;font-weight:300;line-height:1.7;}
  header{text-align:center;padding:4rem 1.5rem 2.5rem;}
  .script{font-family:'Great Vibes',cursive;font-size:clamp(48px,9vw,90px);color:var(--primary);line-height:1;}
  .sub{font-family:'Cormorant Garamond',serif;text-transform:uppercase;letter-spacing:.5em;font-size:.8rem;color:var(--secondary);margin-top:.6rem;}
  .rule{width:60px;height:1px;background:var(--secondary);margin:1.6rem auto;}
  header p{max-width:620px;margin:0 auto;color:var(--muted);}
  header a{color:var(--secondary);text-decoration:none;font-weight:500;}
  .campaign{max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem 0;}
  .campaign h2{font-family:'Cormorant Garamond',serif;font-weight:400;color:var(--primary);font-size:2rem;text-align:center;}
  .campaign .tag{text-align:center;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--secondary);margin:.2rem 0 1.8rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:2rem;}
  .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(78,56,56,.11);display:flex;flex-direction:column;}
  .card .imgwrap{background:var(--dark);display:flex;align-items:center;justify-content:center;padding:1rem;}
  .card img{max-width:100%;height:auto;display:block;border-radius:6px;}
  .card .meta{padding:1.2rem 1.4rem 1.4rem;}
  .card h3{font-family:'Cormorant Garamond',serif;font-weight:400;color:var(--primary);font-size:1.4rem;}
  .card .dim{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--secondary);margin:.3rem 0 .8rem;}
  .card .use{color:var(--muted);font-size:.9rem;}
  .card .dl{display:inline-block;margin-top:1rem;padding:.5rem 1.3rem;border:1.5px solid var(--secondary);border-radius:50px;color:var(--secondary);text-decoration:none;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;font-weight:500;transition:all .3s;}
  .card .dl:hover{background:var(--secondary);color:#fff;}
  footer{text-align:center;padding:4rem 2rem 2rem;color:var(--muted);font-size:.85rem;}
</style>
</head>
<body>
  <header>
    <div class="script">The Wandering Bar</div>
    <div class="sub">Promo Graphics</div>
    <div class="rule"></div>
    <p>Six brand-aware campaigns × four formats each, for the luxury mobile bar — Kamloops, BC. &nbsp;<a href="https://www.thewanderingbarshuswap.com/">Visit website →</a></p>
  </header>
  <main id="gallery"></main>
  <footer>www.thewanderingbarshuswap.com &nbsp;·&nbsp; @thewanderingbars</footer>
<script>
  const formats = [
    { key:'square-1200', name:'Square', dim:'1200 × 1200', use:'Facebook Marketplace & Instagram feed.' },
    { key:'story-1080x1920', name:'Story', dim:'1080 × 1920', use:'IG / FB Stories & Reels covers.' },
    { key:'banner-1200x675', name:'Banner', dim:'1200 × 675', use:'Facebook cover & link previews.' },
    { key:'poster-letter-2550x3300', name:'Poster / Flyer', dim:'2550 × 3300 · 300 DPI', use:'Print-ready 8.5 × 11 flyer.' },
  ];
  const campaigns = [
    { id:'brand', title:'Brand', tag:'Luxury that travels to you', legacy:true },
    { id:'wedding', title:'Weddings', tag:'To love, laughter & happily ever after' },
    { id:'party', title:'Private Parties', tag:'Bring the bar to the party' },
    { id:'craft', title:'Craft Cocktails', tag:'Cocktails worth travelling for' },
    { id:'booking', title:'Now Booking 2026', tag:'Your date won’t wait' },
    { id:'sips', title:'Zero-Proof & Coffee', tag:'Every guest raises a glass' },
  ];
  const file = (c, f) => `images/wanderingbar-${c.legacy ? '' : c.id + '-'}${f.key}.png`;
  document.getElementById('gallery').innerHTML = campaigns.map(c => `
    <section class="campaign">
      <h2>${c.title}</h2>
      <div class="tag">${c.tag}</div>
      <div class="grid">
        ${formats.map(f => `
        <div class="card">
          <div class="imgwrap"><img src="${file(c,f)}" alt="${c.title} — ${f.name}" loading="lazy"></div>
          <div class="meta"><h3>${f.name}</h3><div class="dim">${f.dim}</div><div class="use">${f.use}</div><a class="dl" href="${file(c,f)}" download>Download</a></div>
        </div>`).join('')}
      </div>
    </section>`).join('');
</script>
</body>
</html>
